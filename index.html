<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 关键移动端视口配置，禁止缩放、适配真实设备宽度 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>里程碑两级任务管理系统 V2.6.2｜云端JSON同步增量版本</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3662EC',
            secondary: '#2A3C74'
          }
        }
      }
    }
  </script>
  <style>
    /* ========== 原版V2.6.1全部样式完整保留，无删减无修改 ========== */
    .timeline-wrap{display:flex;align-items:center;overflow-x:auto;padding:10px 0;gap:0}
    .timeline-item{display:flex;align-items:center;flex-shrink:0}
    .milestone-card{width:220px;border:1px solid #d1d5db;border-radius:6px;padding:14px;background:#fff;text-align:center;cursor:pointer;color:#000;}
    .milestone-card.active{border:2px solid #3662EC;background-color:rgba(54, 98, 236, 0.08);}
    .timeline-line{width:30px;height:2px;background:#9ca3af;flex-shrink:0}
    .status-dot{width:18px;height:18px;border-radius:50%;margin:0 auto 6px;box-sizing:border-box}
    .status-finish{background:transparent;border:2px solid #6b7280;}
    .status-doing{background:#3662EC;border:none;}
    .status-wait{background:transparent;border:2px solid #9ca3af}

    .collapse-item{border:1px solid #e5e7eb;border-radius:6px;margin-bottom:10px;background:#fff}
    .collapse-header.module-header{
      padding:16px 16px;
      background:rgba(54, 98, 236, 0.06);
      border-top:3px solid #3662EC;
      transition: background-color 0.2s ease;
    }
    .collapse-header.module-header:hover{
      background:rgba(54, 98, 236, 0.12);
    }
    .collapse-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;gap:12px;flex-wrap:wrap}
    .collapse-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height 0.3s ease}
    .collapse-body.open{padding:12px 16px;max-height:2000px}
    .progress-bar-bg{width:120px;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden}
    .progress-bar-inner{height:100%;background:#3662EC;border-radius:4px}
    .title-input{border:1px solid transparent;outline:none;background:transparent;font-weight:500;color:#000;}
    .module-header .title-input{
      font-weight:600;
      font-size:1rem;
    }
    .title-input:focus{border:1px solid #3662EC;border-radius:4px;padding:0 4px;}
    .modal-mask{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z:50}

    .btn-primary{background:#3662EC;color:#fff;}
    .btn-primary:hover{background:#2A3C74;}
    .btn-secondary{background:#2A3C74;color:#fff;}
    .btn-secondary:hover{background:#3662EC;}
    .btn-gray{background:#9ca3af;color:#fff;}
    .btn-gray:hover{background:#6b7280;}
    .btn-danger{background:#6b7280;color:#fff;}
    .btn-danger:hover{background:#374151;}

    .btn-outline-primary{
      border:1px solid #3662EC;
      color:#3662EC;
      background:#ffffff;
    }
    .btn-outline-primary:hover{
      background:rgba(54, 98, 236, 0.08);
    }
    .btn-outline-secondary{
      border:1px solid #2A3C74;
      color:#2A3C74;
      background:#ffffff;
    }
    .btn-outline-secondary:hover{
      background:rgba(42, 60, 116, 0.08);
    }
    .btn-outline-gray{
      border:1px solid #9ca3af;
      color:#6b7280;
      background:#ffffff;
    }
    .btn-outline-gray:hover{
      background:#f3f4f6;
    }
    .btn-outline-danger{
      border:1px solid #6b7280;
      color:#374151;
      background:#ffffff;
    }
    .btn-outline-danger:hover{
      background:#f3f4f6;
    }

    .date-real {
        color: #235796;
    }

    /* ========== V2.6.1 新增：移动端适配核心样式【不影响PC端展示效果】 ========== */
    * {
      box-sizing: border-box !important;
    }
    body {
      overflow-x: hidden !important;
    }

    @media screen and (max-width: 768px) {
      body {
        padding: 8px !important;
      }
      .milestone-card {
        width: 160px !important;
      }
      /* 所有头部自动垂直换行，不再横向挤压 */
      .collapse-header {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 8px !important;
      }
      /* 二级任务行完全自适应、自动换行、无溢出 */
      .collapse-body .flex {
        flex-wrap: wrap !important;
      }
      /* 输入框、日期框自动缩窄适配手机 */
      input[type="date"],
      input[type="number"],
      .title-input {
        max-width: 100% !important;
        width: auto !important;
      }
      /* 进度条自适应缩小 */
      .progress-bar-bg {
        width: 90px !important;
      }
      /* 按钮缩小适配移动端触屏操作 */
      button {
        font-size: 12px !important;
        padding: 4px 8px !important;
      }
      /* 杜绝所有容器横向溢出 */
      #taskContainer,
      .collapse-body,
      .collapse-item {
        overflow-x: hidden !important;
        max-width: 100% !important;
      }
   }
  </style>
</head>
<body class="bg-gray-50 p-4 md:p-6">
<div class="max-w-7xl mx-auto">
  <section class="bg-white rounded-lg shadow p-4 mb-6">
    <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
<h2 class="text-lg font-semibold text-black">一、项目里程碑</h2>
<div class="flex gap-3 flex-wrap">
<button onclick="exportAllData()" class="px-3 py-1 btn-primary rounded">导出全部数据</button>
<button onclick="downloadCloudJson()" class="px-3 py-1 btn-outline-primary rounded">导出发布JSON</button>
<button onclick="openImportModal()" class="px-3 py-1 btn-secondary rounded">导入表格</button>
<button onclick="openMilestoneManage()" class="px-3 py-1 btn-gray rounded">管理选中里程碑</button>
<button onclick="addMilestone()" class="px-3 py-1 btn-primary rounded">新增里程碑</button>
</div>
</div>
<div id="milestoneWrap" class="timeline-wrap"></div>
</section>

 <section class="bg-white rounded-lg shadow p-4">
<div class="flex justify-between items-center mb-4 flex-wrap gap-2">
      <h2 class="text-lg font-semibold text-black">二、功能模块与任务管理（当前绑定里程碑：<span id="bindMilestoneName" class="text-primary">未选中任何里程碑</span>）</h2>
      <button id="addModuleBtn" onclick="addModule()" disabled class="px-3 py-1 btn-outline-secondary rounded disabled:border-gray-300 disabled:text-gray-400 disabled:bg-gray-50 disabled:cursor-not-allowed">新增功能模块</button>
</div>
<div id="taskContainer">
<div class="py-10 text-center text-gray-400">请点击上方任意里程碑以加载对应任务</div>
    </div>
  </div>

<!-- 里程碑编辑弹窗 -->
<div class="modal-mask" id="milestoneModal">
<div class="modal-content w-80 bg-white rounded-lg p-5">
   <h3 class="font-semibold text-lg mb-4 text-black">编辑里程碑信息</h3>
<div class="space-y-3">
<div>
       <label class="text-sm text-gray-600 block mb-1">里程碑名称</label>
       <input id="editMsName" class="w-full border border-gray-300 rounded px-2 py-2 text-sm text-black focus:border-primary outline-none">
</div>
<div>
<label class="text-sm text-gray-600 block mb-1">计划截止日期</label>
<input type="date" id="editMsDate" class="w-full border border-gray-300 rounded px-2 py-2 text-sm text-black focus:border-primary outline-none">
</div>
<div>
<label class="text-sm text-gray-600 block mb-1">当前状态</label>
<select id="editMsStatus" class="w-full border border-gray-300 rounded px-2 py-2 text-sm text-black focus:border-primary outline-none">
<option value="wait">待开始</option>
<option value="doing">进行中</option>
<option value="finish">已完成</option>
</select>
      </div>
    <div class="flex justify-between mt-5">
      <button onclick="deleteCurrentMilestone()" class="px-3 py-1 btn-outline-danger rounded">删除里程碑</button>
      <div class="flex gap-2">
<button onclick="closeModal('milestoneModal')" class="px-3 py-1 btn-outline-gray rounded">取消</button>
<button onclick="saveMilestoneEdit()" class="px-3 py-1 btn-outline-primary rounded">保存修改</button>
</div>
</div>
 </div>
</div>

<!-- 表格导入弹窗 -->
<div class="modal-mask" id="importModal">
<div class="w-96 bg-white rounded-lg p-5">
<h3 class="font-semibold text-lg mb-4 text-black">导入表格文件（支持 *.csv / *.xlsx / *.xls）</h3>
   <p class="text-sm text-gray-500 mb-3">标准表头：里程碑名称,计划日期,状态,功能模块,一级任务,二级任务,任务计划日期,任务实际日期,任务进度</p>
<input type="file" id="importFile" accept=".csv,.xlsx,.xls" class="mb-3 w-full border border-gray-300 rounded p-2">
<div class="flex gap-3 mb-3">
<label class="flex items-center gap-1 text-black">
<input type="radio" name="importMode" value="append" checked>追加导入
</label>
<label class="flex items-center gap-1 text-black">
       <input type="radio" name="importMode" value="cover">覆盖原有全部数据
</label>
</div>
<div class="flex justify-end gap-2">
<button onclick="closeModal('importModal')" class="px-3 py-1 btn-outline-gray rounded">取消</button>
<button onclick="handleImportFile()" class="px-3 py-1 btn-outline-primary rounded">确认导入</button>
    </div>
  </div>
</div>

<script>
// ===================== V2.6.2 新增配置项：你的仓库JSON直链 =====================
const JSON_RAW_URL = "https://raw.githubusercontent.com/LiXiangLuo/LiXiangLuo.github.io/main/task-data.json";

// V2.6.2 新增：加载云端线上数据函数
async function loadRemoteData() {
  try {
    const res = await fetch(JSON_RAW_URL);
    if (!res.ok) throw new Error("线上文件获取失败");
    const cloudData = await res.json();
    milestoneList = cloudData;
    console.log("已加载云端最新数据");
  } catch (err) {
    console.warn("读取云端失败，启用本地缓存", err);
    const local = localStorage.getItem("milestoneData");
    if(local) milestoneList = JSON.parse(local);
  }
  renderAll();
}

// V2.6.2 新增：导出可直接上传仓库的JSON文件
function downloadCloudJson() {
  const jsonStr = JSON.stringify(milestoneList,null,2);
  const blob = new Blob([jsonStr],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "task-data.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

// V2.6.2 新增统一渲染入口
function renderAll(){
  renderMilestone();
  renderTaskPanel();
}

// 全局数据定义
let milestoneList = JSON.parse(localStorage.getItem("milestoneData")) || [];
let selectMilestoneId = null;
let uniqueId = Date.now();

// V2.6.0 新增：全局防抖锁，规避死循环与重复渲染
const refreshTaskLock = new Map();
const LOCK_EXPIRE = 300;

// 生成唯一ID
function getUid(){
  return ++uniqueId;
}

// V2.3.9 新增：单元格内容标准化处理函数
function formatCellValue(val) {
    if (val instanceof Date) {
        const year = val.getFullYear();
        const month = String(val.getMonth() + 1).padStart(2, '0');
        const day = String(val.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }
    if (val === null || val === undefined) return "";
    return String(val).trim();
}

function getLatestValidDate(dateList) {
    const validDates = [];
    for(const item of dateList){
        const val = String(item ?? "").trim();
        if(val === "" || val === "0000-00-00") continue;
        const reg = /^\d{4}-\d{2}-\d{2}$/;
        if(!reg.test(val)) continue;
        validDates.push(val);
    }
    if(validDates.length === 0) return "";
    validDates.sort();
    return validDates.pop();
}

function aggregateChildTaskDate(levelOneId, isAutoUpdate) {
    const now = Date.now();
    if(refreshTaskLock.has(levelOneId)){
        const lastTime = refreshTaskLock.get(levelOneId);
        if(now - lastTime < LOCK_EXPIRE) return;
    }
    refreshTaskLock.set(levelOneId, now);

    const ms = milestoneList.find(m=>m.id === selectMilestoneId);
    if(!ms) return;
    let targetOne = null;
    let parentModule = null;
    outer:for(const mod of ms.moduleList){
        for(const l1 of mod.levelOneTasks){
            if(l1.id === levelOneId){
                targetOne = l1;
                parentModule = mod;
                break outer;
            }
        }
    }
    if(!targetOne) return;

    if(targetOne.autoPlanDate === undefined) targetOne.autoPlanDate = false;
    if(targetOne.autoActualDate === undefined) targetOne.autoActualDate = false;

    const planArr = targetOne.levelTwoTasks.map(item=>item.planFinishDate);
    const actualArr = targetOne.levelTwoTasks.map(item=>item.actualFinishDate);
    const latestPlan = getLatestValidDate(planArr);
    const latestActual = getLatestValidDate(actualArr);

    if(targetOne.autoPlanDate){
        targetOne.planFinishDate = latestPlan;
    }
    if(targetOne.autoActualDate){
        targetOne.actualFinishDate = latestActual;
    }

    saveAllData();
    if(!isAutoUpdate){
        calcLevelOneProgress(targetOne);
        calcModuleProgress(parentModule);
        calcMilestoneProgressByMs(ms);
        saveAllData();
    }
    renderMilestone();
    renderTaskPanel();
}

function saveAllData(){
  localStorage.setItem("milestoneData",JSON.stringify(milestoneList));
}

function closeModal(modalId){
  document.getElementById(modalId).style.display = "none";
}

function openImportModal(){
  document.getElementById("importModal").style.display = "flex";
  document.getElementById("importFile").value = "";
}

function exportAllData(){
  if(milestoneList.length === 0){
    alert("暂无任何里程碑数据，无法导出");
    return;
  }
  const timestamp = new Date().toISOString().slice(0,10);
  const headers = ["里程碑名称","计划日期","状态","功能模块","一级任务","二级任务","任务计划日期","任务实际日期","任务进度(%)"];
  const tableData = [];
  tableData.push(headers);

  milestoneList.forEach(ms=>{
    const msPlanDate = formatCellValue(ms.planDate);
    if(ms.moduleList.length === 0){
      const row = [
        ms.name,msPlanDate,ms.status,
        "","","","",""
      ];
      tableData.push(row);
      return;
    }

    ms.moduleList.forEach(mod=>{
      const modPlan = formatCellValue(mod.planFinishDate);
      const modActual = formatCellValue(mod.actualFinishDate);
      if(mod.levelOneTasks.length === 0){
        const row = [
          ms.name,msPlanDate,ms.status,
          mod.name,"","",modPlan,modActual,""
        ];
        tableData.push(row);
        return;
      }

      mod.levelOneTasks.forEach(l1=>{
        const l1Plan = formatCellValue(l1.planFinishDate);
        const l1Actual = formatCellValue(l1.actualFinishDate);
        if(l1.levelTwoTasks.length === 0){
          const row = [
            ms.name,msPlanDate,ms.status,
            mod.name,l1.name,"",l1Plan,l1Actual,""
          ];
          tableData.push(row);
          return;
        }

        l1.levelTwoTasks.forEach(l2=>{
          const l2Plan = formatCellValue(l2.planFinishDate);
          const l2Actual = formatCellValue(l2.actualFinishDate);
          const row = [
            ms.name,msPlanDate,ms.status,
            mod.name,
            l1.name,
            l2.name,
            l2Plan,l2Actual,l2.progress
          ];
          tableData.push(row);
        })
      })
    })
  })

  const worksheet = XLSX.utils.aoa_to_sheet(tableData);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "任务数据");
  const excelBuffer = XLSX.write(workbook, { bookType: "xlsx", type: "array" });
  const blob = new Blob([excelBuffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `任务表格_${timestamp}.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleImportFile(){
  const file = document.getElementById("importFile").files[0];
  if(!file){
    alert("请先选择需要导入的表格文件");
    return;
  }
  const importMode = document.querySelector('input[name="importMode"]:checked').value;
  const reader = new FileReader();
  reader.onload = function(e){
    const buffer = e.target.result;
    const workbook = XLSX.read(buffer,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const jsonData = XLSX.utils.sheet_to_json(sheet,{header:1});
    const tableRows = jsonData.slice(1).filter(row=>row.length>0 && row[5]);
    if(importMode === "cover") milestoneList = [];
    tableRows.forEach(row=>{
      const msName = formatCellValue(row[0] || "默认里程碑");
      const msPlan = formatCellValue(row[1] || "");
      const msStatus = ["wait","doing","finish"].includes(formatCellValue(row[2])) ? formatCellValue(row[2]) : "wait";
      const modName = formatCellValue(row[3] || "默认模块");
      const l1Name = formatCellValue(row[4] || "一级任务");
      const l2Name = formatCellValue(row[5] || "二级任务");
      const l2Plan = formatCellValue(row[6] || "");
      const l2Actual = formatCellValue(row[7] || "");
      const l2Progress = Math.min(100,Math.max(0,Number(row[8]||0)));

      let milestone = milestoneList.find(m=>m.name === msName);
      if(!milestone){
        milestone = {
          id:getUid(),name:msName,planDate:msPlan,status:msStatus,progress:0,moduleList:[]
        };
        milestoneList.push(milestone);
      }
      let module = milestone.moduleList.find(m=>m.name === modName);
      if(!module){
        module = {id:getUid(),name:modName,planFinishDate:"",actualFinishDate:"",progress:0,open:false,levelOneTasks:[]};
        milestone.moduleList.push(module);
      }
      let l1Task = module.levelOneTasks.find(t=>t.name === l1Name);
      if(!l1Task){
        l1Task = {
            id:getUid(),
            name:l1Name,
            planFinishDate:"",
            actualFinishDate:"",
            progress:0,
            open:false,
            levelTwoTasks:[],
            autoPlanDate:true,
            autoActualDate:true
        };
        module.levelOneTasks.push(l1Task);
      }
      l1Task.levelTwoTasks.push({
        id:getUid(),name:l2Name,planFinishDate:l2Plan,actualFinishDate:l2Actual,progress:l2Progress
      })
    })
    saveAllData();
    milestoneList.forEach(ms=>{
      ms.moduleList.forEach(mod=>calcModuleProgress(mod));
      calcMilestoneProgressByMs(ms);
    })
    renderMilestone();
    renderTaskPanel();
    closeModal("importModal");
    alert("文件导入完成！");
  }
  reader.readAsArrayBuffer(file);
}

function calcMilestoneProgressByMs(ms){
  if(ms.moduleList.length === 0){
    ms.progress = 0;
    return;
  }
  let sum = 0;
  ms.moduleList.forEach(item=>sum += item.progress);
  ms.progress = Math.round(sum / ms.moduleList.length);
}

function calcLevelOneProgress(task){
  if(task.levelTwoTasks.length === 0){
    task.progress = 0;
    return task.progress;
  }
  let total = 0;
  task.levelTwoTasks.forEach(t=>total += Number(t.progress));
  task.progress = Math.round(total / task.levelTwoTasks.length);
  return task.progress;
}

function calcModuleProgress(moduleItem){
  if(moduleItem.levelOneTasks.length === 0){
    moduleItem.progress = 0;
    return moduleItem.progress;
  }
  moduleItem.levelOneTasks.forEach(item=>calcLevelOneProgress(item));
  let total = 0;
  moduleItem.levelOneTasks.forEach(t=>total+=Number(t.progress));
  moduleItem.progress = Math.round(total / moduleItem.levelOneTasks.length);
  return moduleItem.progress;
}

function refreshCurrentMilestoneProgress(){
  if(!selectMilestoneId) return;
  const ms = milestoneList.find(m=>m.id === selectMilestoneId);
  ms.moduleList.forEach(mod => calcModuleProgress(mod));
  calcMilestoneProgressByMs(ms);
  saveAllData();
  renderMilestone();
  renderTaskPanel();
}

function addMilestone(){
  const newMs = {
    id:getUid(),
    name:"新项目里程碑",
    planDate:"",
    status:"wait",
    progress:0,
    moduleList:[]
  }
  milestoneList.push(newMs);
  saveAllData();
  renderMilestone();
}

function selectMilestone(id){
  selectMilestoneId = id;
  const curr = milestoneList.find(item=>item.id === id);
  document.getElementById("bindMilestoneName").innerText = curr.name;
  document.getElementById("addModuleBtn").disabled = false;
  renderMilestone();
  renderTaskPanel();
}

function renderMilestone(){
  const wrap = document.getElementById("milestoneWrap");
  wrap.innerHTML = "";
  milestoneList.forEach((ms,idx)=>{
    const itemWrap = document.createElement("div");
    itemWrap.className = "timeline-item";
    let statusClass = "status-wait";
    if(ms.status === "finish") statusClass = "status-finish";
    if(ms.status === "doing") statusClass = "status-doing";
    itemWrap.innerHTML = `
     <div class="milestone-card ${selectMilestoneId===ms.id?'active':''}" onclick="selectMilestone(${ms.id})">
       <div class="status-dot ${statusClass}"></div>
       <div class="font-medium text-sm mb-2 text-black">${ms.name}</div>
       <div class="text-xs text-gray-500">计划：${ms.planDate||"未设置日期"}</div>
        <div class="text-xs mt-1">整体进度：${ms.progress}%</div>
      </div>
      ${idx !== milestoneList.length-1 ? '<div class="timeline-line"></div>' : ''}
    `;
    wrap.appendChild(itemWrap);
  })
}

function openMilestoneManage(){
  if(!selectMilestoneId){
    alert("请先选中一个里程碑");
    return;
  }
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  document.getElementById("editMsName").value = ms.name;
  document.getElementById("editMsDate").value = ms.planDate;
  document.getElementById("editMsStatus").value = ms.status;
  document.getElementById("milestoneModal").style.display = "flex";
}

function saveMilestoneEdit(){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  ms.name = document.getElementById("editMsName").value.trim() || ms.name;
  ms.planDate = document.getElementById("editMsDate").value;
  ms.status = document.getElementById("editMsStatus").value;
  saveAllData();
  renderMilestone();
  closeModal("milestoneModal");
}

function deleteCurrentMilestone(){
  milestoneList = milestoneList.filter(m=>m.id !== selectMilestoneId);
  selectMilestoneId = null;
  document.getElementById("bindMilestoneName").innerText = "未选中任何里程碑";
  document.getElementById("addModuleBtn").disabled = true;
  saveAllData();
  renderMilestone();
  renderTaskPanel();
  closeModal("milestoneModal");
}

function addModule(){
  const ms = milestoneList.find(m=>m.id === selectMilestoneId);
  const newModule = {
    id:getUid(),
    name:"新建功能模块",
    planFinishDate:"",
    actualFinishDate:"",
    progress:0,
    open:false,
    levelOneTasks:[]
  }
  ms.moduleList.push(newModule);
  refreshCurrentMilestoneProgress();
}

function deleteModule(moduleId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  ms.moduleList = ms.moduleList.filter(item=>item.id !== moduleId);
  refreshCurrentMilestoneProgress();
}

function toggleModule(moduleId){
  const ms = milestoneList.find(m=>m.id === selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id === moduleId);
  mod.open = !mod.open;
  saveAllData();
  renderTaskPanel();
}

function addLevelOneTask(moduleId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id === moduleId);
  const newTask = {
    id:getUid(),
    name:"一级主任务",
    planFinishDate:"",
    actualFinishDate:"",
    progress:0,
    open:false,
    levelTwoTasks:[],
    autoPlanDate:true,
    autoActualDate:true
  }
  mod.levelOneTasks.push(newTask);
  refreshCurrentMilestoneProgress();
}

function deleteLevelOneTask(moduleId,taskId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id===moduleId);
  mod.levelOneTasks = mod.levelOneTasks.filter(t=>t.id !== taskId);
  refreshCurrentMilestoneProgress();
}

function toggleLevelOne(moduleId,taskId){
  const ms = milestoneList.find(m=>m.id === selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id===moduleId);
  const task = mod.levelOneTasks.find(t=>t.id === taskId);
  task.open = !task.open;
  saveAllData();
  renderTaskPanel();
}

function addLevelTwoTask(moduleId,oneTaskId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id===moduleId);
  const oneTask = mod.levelOneTasks.find(t=>t.id === oneTaskId);
  const newTwoTask = {
    id:getUid(),
    name:"二级细分任务",
    planFinishDate:"",
    actualFinishDate:"",
    progress:0
  }
  oneTask.levelTwoTasks.push(newTwoTask);
  refreshCurrentMilestoneProgress();
  aggregateChildTaskDate(oneTaskId, true);
}

function deleteLevelTwoTask(moduleId,oneTaskId,twoTaskId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id===moduleId);
  const oneTask = mod.levelOneTasks.find(t=>t.id === oneTaskId);
  oneTask.levelTwoTasks = oneTask.levelTwoTasks.filter(item=>item.id !== twoTaskId);
  refreshCurrentMilestoneProgress();
  aggregateChildTaskDate(oneTaskId, true);
}

function updateTwoProgress(moduleId,oneTaskId,twoTaskId,val){
  val = Number(val);
  val = Math.max(0,Math.min(100,val));
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id===moduleId);
  const oneTask = mod.levelOneTasks.find(t=>t.id === oneTaskId);
  const twoTask = oneTask.levelTwoTasks.find(item=>item.id === twoTaskId);
  twoTask.progress = val;
  refreshCurrentMilestoneProgress();
}

function updateTaskField(type,moduleId,oneId,twoId,field,value){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  if(type === "module"){
    const mod = ms.moduleList.find(item=>item.id===moduleId);
    mod[field] = value;
  }else if(type === "one"){
    const mod = ms.moduleList.find(item=>item.id===moduleId);
    const task = mod.levelOneTasks.find(t=>t.id===oneId);
    task[field] = value;
    if(field === "planFinishDate"){
        task.autoPlanDate = false;
    }
    if(field === "actualFinishDate"){
        task.autoActualDate = false;
    }
  }else if(type === "two"){
    const mod = ms.moduleList.find(item=>item.id===moduleId);
    const task = mod.levelOneTasks.find(t=>t.id===oneId);
    const two = task.levelTwoTasks.find(item=>item.id === twoId);
    two[field] = value;
    aggregateChildTaskDate(oneId, true);
  }
  saveAllData();
}

function renderTaskPanel(){
  const container = document.getElementById("taskContainer");
  if(!selectMilestoneId){
    container.innerHTML =`<div class="py-10 text-center text-gray-400">请点击上方任意里程碑以加载任务列表</div>`;
    return;
  }
  const ms = milestoneList.find(m=>m.id === selectMilestoneId);
  if(ms.moduleList.length === 0){
    container.innerHTML=`<div class="py-8 text-center text-gray-400">当前里程碑暂无功能模块，请点击上方【新增功能模块】</div>`;
    return;
  }
  let html = "";
  ms.moduleList.forEach(mod=>{
    html += `
    <div class="collapse-item">
    <div class="collapse-header module-header" onclick="toggleModule(${mod.id})">
    <div class="flex items-center gap-3 flex-wrap">
<span>${mod.open ? '▾' : '›'}</span>
<input class="title-input w-52" value="${mod.name}" onclick="event.stopPropagation()" onchange="updateTaskField('module',${mod.id},0,0,'name',this.value)">
         <div class="progress-bar-bg">
         <div class="progress-bar-inner" style="width:${mod.progress}%"></div>
         </div>
<span class="text-sm text-gray-500">模块进度：${mod.progress}%（自动汇总）</span>
<div class="flex gap-2 text-sm">
<span style="font-size:12px;margin-right:4px;">【计划】</span>
<input onclick="event.stopPropagation()" value="${mod.planFinishDate}" title="计划完成日期：预先设定的目标办结时间，对应导入表格的任务计划日期列" onchange="updateTaskField('module',${mod.id},0,0,'planFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
<span style="font-size:12px;margin-right:4px;color:#235796;">【实际】</span>
           <input class="date-real" onclick="event.stopPropagation()" value="${mod.actualFinishDate}" title="实际完成日期：任务最终真实办结时间，对应导入表格的任务实际日期列" onchange="updateTaskField('module',${mod.id},0,0,'actualFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
</div>
        </div>
        <div class="flex gap-2 mt-2">
<button onclick="addLevelOneTask(${mod.id});event.stopPropagation()" class="text-xs btn-outline-primary px-2 py-1 rounded">新增一级任务</button>
<button onclick="deleteModule(${mod.id});event.stopPropagation()" class="text-xs btn-outline-danger px-2 py-1 rounded">删除模块</button>
</div>
</div>
<div class="collapse-body ${mod.open?'open':''}">
    `;
    if(mod.levelOneTasks.length === 0){
      html +=`<div class="py-2 text-gray-400 text-sm">暂无一级任务，可点击上方按钮进行添加</div>`;
    }else{
      mod.levelOneTasks.forEach(oneTask=>{
        html += `
        <div class="collapse-item my-3">
          <div class="collapse-header py-2" onclick="toggleLevelOne(${mod.id},${oneTask.id})">
          <div class="flex items-center gap-3 flex-wrap">
              <span class="text-sm">${oneTask.open ? '▾' : '›'}</span>
              <input class="title-input w-48 text-sm" value="${oneTask.name}" onclick="event.stopPropagation()" onchange="updateTaskField('one',${mod.id},${oneTask.id},0,'name',this.value)">
              <div class="progress-bar-bg">
              <div class="progress-bar-inner" style="width:${oneTask.progress}%"></div>
              </div>
             <span class="text-xs text-gray-500">一级任务进度：${oneTask.progress}%</span>
<div class="flex gap-2 text-xs">
<span style="font-size:12px;margin-right:4px">【计划】</span>
<input onclick="event.stopPropagation()" value="${oneTask.planFinishDate}" title="计划完成日期：预先设定的目标办结时间，对应导入表格的任务计划日期列" onchange="updateTaskField('one',${mod.id},${oneTask.id},0,'planFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
<span style="font-size:12px;margin-right:4px;color:#235796;">【实际】</span>
                <input class="date-real" onclick="event.stopPropagation()" value="${oneTask.actualFinishDate}" title="实际完成日期：任务最终真实办结时间，对应导入表格的任务实际日期列" onchange="updateTaskField('one',${mod.id},${oneTask.id},0,'actualFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
</div>
</div>
<div class="flex gap-2 mt-2">
<button onclick="addLevelTwoTask(${mod.id},${oneTask.id});event.stopPropagation()" class="text-xs btn-outline-secondary px-2 py-1 rounded">新增二级任务</button>
<button onclick="deleteLevelOneTask(${mod.id},${oneTask.id});event.stopPropagation()" class="text-xs btn-outline-danger px-2 py-1 rounded">删除</button>
</div>
</div>
         <div class="collapse-body ${oneTask.open?'open':''} pl-4">
        `;
        if(oneTask.levelTwoTasks.length === 0){
          html += `<div class="py-2 text-gray-400 text-sm">暂无二级细分任务</div>`;
        }else{
          oneTask.levelTwoTasks.forEach(twoTask=>{
            html += `
           <div class="flex items-center flex-wrap gap-3 py-2 border-b border-gray-200 text-sm">
              <input value="${twoTask.name}" onclick="event.stopPropagation()" onchange="updateTaskField('two',${mod.id},${oneTask.id},${twoTask.id},'name',this.value)" class="border border-gray-300 px-2 py-1 rounded w-40 focus:border-primary outline-none">
              <span style="font-size:12px;margin-right:4px;">【计划】</span>
              <input onclick="event.stopPropagation()" value="${twoTask.planFinishDate}" title="计划完成日期：预先设定的目标办结时间，对应导入表格的任务计划日期列" onchange="updateTaskField('two',${mod.id},${oneTask.id},${twoTask.id},'planFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
              <span style="font-size:12px;margin-right:4px;color:#235796;">【实际】</span>
              <input class="date-real" onclick="event.stopPropagation()" value="${twoTask.actualFinishDate}" title="实际完成日期：任务最终真实办结时间，对应导入表格的任务实际日期列" onchange="updateTaskField('two',${mod.id},${oneTask.id},${twoTask.id},'actualFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
<div class="flex items-center gap-2">
<input type="number" min="0" max="100" value="${twoTask.progress}" onclick="event.stopPropagation()" onblur="updateTwoProgress(${mod.id},${oneTask.id},${twoTask.id},this.value)" class="w-14 border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
<span>%</span>
<div class="progress-bar-bg">
<div class="progress-bar-inner" style="width:${twoTask.progress}%"></div>
</div>
<button onclick="deleteLevelTwoTask(${mod.id},${oneTask.id},${twoTask.id});event.stopPropagation()" class="text-xs btn-outline-danger px-2 py-1 rounded">删除</button>
</div>
            </div>
          `;
          })
        }
        html +=`</div>`;
      })
    }
    html +=`</div>`;
  })
  container.innerHTML = html;
}

// V2.6.2 修改初始化入口，优先加载云端数据
window.onload=()=>{
  loadRemoteData();
}
</script>
