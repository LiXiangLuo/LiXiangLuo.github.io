<script>
// ===================== V2.6.0 完整原生JS代码【全部原样封存，无任何修改、原有BUG保留不修复】 =====================
// 全局数据定义
let milestoneList = JSON.parse(localStorage.getItem("milestoneData")) || [];
let selectMilestoneId = null;
let uniqueId = Date.now();
// V2.6.0 新增：全局防抖锁，规避死循环与重复请求
const refreshTaskLock = new Map();
const LOCK_EXPIRE = 300;
// 生成唯一ID
function getUid(){
  return ++uniqueId;
}
// V2.3.9 新增：单元格内容标准化处理函数
function formatCellValue(val) {
    if (val instanceof Date) {
        const year = val.getFullYear();
        const month = String(val.getMonth() + 1).padStart(2, '0');
        const day = String(val.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }
    if (val === null || val === undefined) return "";
    return String(val).trim();
}
/*
数据结构
milestone:{id,name,planDate,status,progress,moduleList:[]}
module:{id,name,planFinishDate,actualFinishDate,progress,open:boolean,levelOneTasks:[]}
levelOneTask:{
    id,name,planFinishDate,actualFinishDate,progress,open:boolean,levelTwoTasks:[],
    autoPlanDate:Boolean,   // V2.6.0新增：计划日期是否自动同步下级
    autoActualDate:Boolean   // V2.6.0新增：实际日期是否自动同步下级
}
levelTwoTask:{id,name,planFinishDate,actualFinishDate,progress}
*/
// V2.6.0 新增：筛选有效日期并获取最晚日期
function getLatestValidDate(dateList) {
    const validDates = [];
    for(const item of dateList){
        const val = String(item ?? "").trim();
        if(val === "" || val === "0000-00-00") continue;
        const reg = /^\d{4}-\d{2}-\d{2}$/;
        if(!reg.test(val)) continue;
        validDates.push(val);
    }
    if(validDates.length === 0) return "";
    validDates.sort();
    return validDates.pop();
}
/**
 * V2.6.0 核心聚合函数
 * @param {number} levelOneId 一级任务ID
 * @param {boolean} isAutoUpdate true=系统自动回填，禁止向下递归刷新子任务
 */
function aggregateChildTaskDate(levelOneId, isAutoUpdate) {
    const now = Date.now();
    if(refreshTaskLock.has(levelOneId)){
        const lastTime = refreshTaskLock.get(levelOneId);
        if(now - lastTime < LOCK_EXPIRE) return;
    }
    refreshTaskLock.set(levelOneId, now);
    const ms = milestoneList.find(m=>m.id === selectMilestoneId);
    if(!ms) return;
    let targetOne = null;
    let parentModule = null;
    outer:for(const mod of ms.moduleList){
        for(const l1 of mod.levelOneTasks){
            if(l1.id === levelOneId){
                targetOne = l1;
                parentModule = mod;
                break outer;
            }
        }
    }
    if(!targetOne) return;
    if(targetOne.autoPlanDate === undefined) targetOne.autoPlanDate = false;
    if(targetOne.autoActualDate === undefined) targetOne.autoActualDate = false;
    const planArr = targetOne.levelTwoTasks.map(item=>item.planFinishDate);
    const actualArr = targetOne.levelTwoTasks.map(item=>item.actualFinishDate);
    const latestPlan = getLatestValidDate(planArr);
    const latestActual = getLatestValidDate(actualArr);
    if(targetOne.autoPlanDate){
        targetOne.planFinishDate = latestPlan;
    }
    if(targetOne.autoActualDate){
        targetOne.actualFinishDate = latestActual;
    }
    saveAllData();
    if(!isAutoUpdate){
        calcLevelOneProgress(targetOne);
        calcModuleProgress(parentModule);
        calcMilestoneProgressByMs(ms);
        saveAllData();
    }
    renderMilestone();
    renderTaskPanel();
}
// 持久化保存
function saveAllData(){
  localStorage.setItem("milestoneData",JSON.stringify(milestoneList));
}
// 通用关闭弹窗
function closeModal(modalId){
  document.getElementById(modalId).style.display = "none";
}
// 打开导入弹窗
function openImportModal(){
  document.getElementById("importModal").style.display = "flex";
  document.getElementById("importFile").value = "";
}
/**
 * V2.5.0导出Excel，V2.6.0不导出auto标记
 */
function exportAllData(){
  if(milestoneList.length === 0){
    alert("暂无任何里程碑数据，无法导出");
    return;
  }
  const timestamp = new Date().toISOString().slice(0,10);
  const headers = ["里程碑名称","计划日期","状态","功能模块","一级任务","二级任务","任务计划日期","任务实际日期","任务进度(%)"];
  const tableData = [];
  tableData.push(headers);
  milestoneList.forEach(ms=>{
    const msPlanDate = formatCellValue(ms.planDate);
    if(ms.moduleList.length === 0){
      const row = [
        ms.name,msPlanDate,ms.status,
        "","","","","",""
      ];
      tableData.push(row);
      return;
    }
    ms.moduleList.forEach(mod=>{
      const modPlan = formatCellValue(mod.planFinishDate);
      const modActual = formatCellValue(mod.actualFinishDate);
      if(mod.levelOneTasks.length === 0){
        const row = [
          ms.name,msPlanDate,ms.status,
          mod.name,"","",modPlan,modActual,""
        ];
        tableData.push(row);
        return;
      }
      mod.levelOneTasks.forEach(l1=>{
        const l1Plan = formatCellValue(l1.planFinishDate);
        const l1Actual = formatCellValue(l1.actualFinishDate);
        if(l1.levelTwoTasks.length === 0){
          const row = [
            ms.name,msPlanDate,ms.status,
            mod.name,l1.name,"",l1Plan,l1Actual,""
          ];
          tableData.push(row);
          return;
        }
        l1.levelTwoTasks.forEach(l2=>{
          const l2Plan = formatCellValue(l2.planFinishDate);
          const l2Actual = formatCellValue(l2.actualFinishDate);
          const row = [
            ms.name,msPlanDate,ms.status,
            mod.name,
            l1.name,
            l2.name,
            l2Plan,l2Actual,l2.progress
          ];
          tableData.push(row);
        })
      })
    })
  })
  const worksheet = XLSX.utils.aoa_to_sheet(tableData);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet);
  const excelBuffer = XLSX.write(workbook, { bookType: "xlsx", type: "array" });
  const blob = new Blob([excelBuffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `任务表格_${timestamp}.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
// 读取并解析表格文件
function handleImportFile(){
  const file = document.getElementById("importFile").files[0];
  if(!file){
    alert("请先选择需要导入的表格文件");
    return;
  }
  const importMode = document.querySelector('input[name="importMode"]:checked').value;
  const reader = new FileReader();
  reader.onload = function(e){
    const buffer = e.target.result;
    const workbook = XLSX.read(buffer,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const jsonData = XLSX.utils.sheet_to_json(sheet,{header:1});
    const tableRows = jsonData.slice(1).filter(row=>row.length>0 && row[5]);
    if(importMode === "cover") milestoneList = [];
    tableRows.forEach(row=>{
      const msName = formatCellValue(row[0] || "默认里程碑");
      const msPlan = formatCellValue(row[1] || "");
      const msStatus = ["wait","doing","finish"].includes(formatCellValue(row[2])) ? formatCellValue(row[2]) : "wait";
      const modName = formatCellValue(row[3] || "默认模块");
      const l1Name = formatCellValue(row[4] || "一级任务");
      const l2Name = formatCellValue(row[5] || "二级任务");
      const l2Plan = formatCellValue(row[6] || "");
      const l2Actual = formatCellValue(row[7] || "");
      const l2Progress = Math.min(100,Math.max(0,Number(row[8]||0)));
      let milestone = milestoneList.find(m=>m.name === msName);
      if(!milestone){
        milestone = {
          id:getUid(),name:msName,planDate:msPlan,status:msStatus,progress:0,moduleList:[]
        };
        milestoneList.push(milestone);
      }
      let module = milestone.moduleList.find(m=>m.name === modName);
      if(!module){
        module = {id:getUid(),name:modName,planFinishDate:"",actualFinishDate:"",progress:0,open:false,levelOneTasks:[]};
        milestone.moduleList.push(module);
      }
      let l1Task = module.levelOneTasks.find(t=>t.name === l1Name);
      if(!l1Task){
        l1Task = {
            id:getUid(),
            name:l1Name,
            planFinishDate:"",
            actualFinishDate:"",
            progress:0,
            open:false,
            levelTwoTasks:[],
            autoPlanDate:true,
            autoActualDate:true
        };
        module.levelOneTasks.push(l1Task);
      }
      l1Task.levelTwoTasks.push({
        id:getUid(),name:l2Name,planFinishDate:l2Plan,actualFinishDate:l2Actual,progress:l2Progress
      })
    })
    saveAllData();
    milestoneList.forEach(ms=>{
      ms.moduleList.forEach(mod=>calcModuleProgress(mod));
      calcMilestoneProgressByMs(ms);
    })
    renderMilestone();
    renderTaskPanel();
    closeModal("importModal");
    alert("文件导入完成！");
  }
  reader.readAsArrayBuffer(file);
}
// 指定单个里程碑重算进度
function calcMilestoneProgressByMs(ms){
  if(ms.moduleList.length === 0){
    ms.progress = 0;
    return;
  }
  let sum = 0;
  ms.moduleList.forEach(item=>sum += item.progress);
  ms.progress = Math.round(sum / ms.moduleList.length);
}
// 一级任务进度计算
function calcLevelOneProgress(task){
  if(task.levelTwoTasks.length === 0){
    task.progress = 0;
    return task.progress;
  }
  let total = 0;
  task.levelTwoTasks.forEach(t=>total += Number(t.progress));
  task.progress = Math.round(total / task.levelTwoTasks.length);
  return task.progress;
}
// 模块进度计算
function calcModuleProgress(moduleItem){
  if(moduleItem.levelOneTasks.length === 0){
    moduleItem.progress = 0;
    return moduleItem.progress;
  }
  moduleItem.levelOneTasks.forEach(item=>calcLevelOneProgress(item));
  let total = 0;
  moduleItem.levelOneTasks.forEach(t=>total+=Number(t.progress));
  moduleItem.progress = Math.round(total / moduleItem.levelOneTasks.length);
  return moduleItem.progress;
}
// 刷新当前选中里程碑全量进度
function refreshCurrentMilestoneProgress(){
  if(!selectMilestoneId) return;
  const ms = milestoneList.find(m=>m.id === selectMilestoneId);
  ms.moduleList.forEach(mod => calcModuleProgress(mod));
  calcMilestoneProgressByMs(ms);
  saveAllData();
  renderMilestone();
  renderTaskPanel();
}
// ========== 里程碑基础操作 ==========
function addMilestone(){
  const newMs = {
    id:getUid(),
    name:"新项目里程碑",
    planDate:"",
    status:"wait",
    progress:0,
    moduleList:[]
  }
  milestoneList.push(newMs);
  saveAllData();
  renderMilestone();
}
function selectMilestone(id){
  selectMilestoneId = id;
  const curr = milestoneList.find(item=>item.id === id);
  document.getElementById("bindMilestoneName").innerText = curr.name;
  document.getElementById("addModuleBtn").disabled = false;
  renderMilestone();
  renderTaskPanel();
}
function renderMilestone(){
  const wrap = document.getElementById("milestoneWrap");
  wrap.innerHTML = "";
  milestoneList.forEach((ms,idx)=>{
    const itemWrap = document.createElement("div");
    itemWrap.className = "timeline-item";
    let statusClass = "status-wait";
    if(ms.status === "finish") statusClass = "status-finish";
    if(ms.status === "doing") statusClass = "status-doing";
    itemWrap.innerHTML = `
      <div class="milestone-card ${selectMilestoneId===ms.id?'active':''}" onclick="selectMilestone(${ms.id})">
        <div class="status-dot ${statusClass}"></div>
        <div class="font-medium text-sm mb-2 text-black">${ms.name}</div>
        <div class="text-xs text-gray-500">计划：${ms.planDate||"未设置日期"}</div>
        <div class="text-xs mt-1">整体进度：${ms.progress}%</div>
      </div>
      ${idx !== milestoneList.length-1 ? '<div class="timeline-line"></div>' : ''}
    `;
    wrap.appendChild(itemWrap);
  })
}
function openMilestoneManage(){
  if(!selectMilestoneId){
    alert("请先选中一个里程碑");
    return;
  }
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);

  document.getElementById("editMsDate").value = ms.planDate;
  document.getElementById("editMsStatus").value = ms.status;

}
function saveMilestoneEdit(){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);

  ms.planDate = document.getElementById("editMsDate").value;

}
function deleteCurrentMilestone(){
  milestoneList = milestoneList.filter(m=>m.id !== selectMilestoneId);
  selectMilestoneId = null;
  document.getElementById("bindMilestoneName").innerText = "未选中任何里程碑";

// ========== 功能模块操作 ==========
function addModule(){
  const ms = milestoneList.find(m=>m.id === selectMilestoneId);
  const newModule = {
    id:getUid(),
    name:"新建功能模块",
    planFinishDate:"",
    actualFinishDate:"",
    progress:0,
    open:false,
    levelOneTasks:[]
  }
  ms.moduleList.push(newModule);
  refreshCurrentMilestoneProgress();
}
function deleteModule(moduleId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  ms.moduleList = ms.moduleList.filter(item=>item.id !== moduleId);
  refreshCurrentMilestoneProgress();
}
function toggleModule(moduleId){
  const ms = milestoneList.find(m=>m.id === selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id === moduleId);
  mod.open = !mod.open;
  saveAllData();
  renderTaskPanel();
}
// ========== 一级任务操作 ==========
function addLevelOneTask(moduleId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id === moduleId);
  const newTask = {
    id:getUid(),
    name:"一级主任务",
    planFinishDate:"",
    actualFinishDate:"",
    progress:0,
    open:false,
    levelTwoTasks:[],
    autoPlanDate:true,
    autoActualDate:true
  }
  mod.levelOneTasks.push(newTask);
  refreshCurrentMilestoneProgress();
}
function deleteLevelOneTask(moduleId,taskId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id===moduleId);
  mod.levelOneTasks = mod.levelOneTasks.filter(t=>t.id !== taskId);
  refreshCurrentMilestoneProgress();
}
function toggleLevelOne(moduleId,taskId){
  const ms = milestoneList.find(m=>m.id === selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id===moduleId);
  const task = mod.levelOneTasks.find(t=>t.id === taskId);
  task.open = !task.open;
  saveAllData();
  renderTaskPanel();
}
// ========== 二级底层任务操作 ==========
function addLevelTwoTask(moduleId,oneTaskId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id === moduleId);
  const oneTask = mod.levelOneTasks.find(t=>t.id === oneTaskId);
  const newTwoTask = {
    id:getUid(),
    name:"二级细分任务",
    planFinishDate:"",
    actualFinishDate:"",
    progress:0
  }
  oneTask.levelTwoTasks.push(newTwoTask);
  refreshCurrentMilestoneProgress();
  aggregateChildTaskDate(oneTaskId, true);
}
function deleteLevelTwoTask(moduleId,oneTaskId,twoTaskId){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id===moduleId);
  const oneTask = mod.levelOneTasks.find(t=>t.id === oneTaskId);
  oneTask.levelTwoTasks = oneTask.levelTwoTasks.filter(item=>item.id !== twoTaskId);
  refreshCurrentMilestoneProgress();
  aggregateChildTaskDate(oneTaskId, true);
}
function updateTwoProgress(moduleId,oneTaskId,twoTaskId,val){
  val = Number(val);
  val = Math.max(0,Math.min(100,val));
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  const mod = ms.moduleList.find(item=>item.id===moduleId);
  const oneTask = mod.levelOneTasks.find(t=>t.id === oneTaskId);
  const twoTask = oneTask.levelTwoTasks.find(item=>item.id === twoTaskId);
  twoTask.progress = val;
  refreshCurrentMilestoneProgress();
}
/**
 * V2.6.0 通用字段更新函数
 */
function updateTaskField(type,moduleId,oneId,twoId,field,value){
  const ms = milestoneList.find(m=>m.id===selectMilestoneId);
  if(type === "module"){
    const mod = ms.moduleList.find(item=>item.id===moduleId);
    mod[field] = value;
  }else if(type === "one"){
    const mod = ms.moduleList.find(item=>item.id===moduleId);
    const task = mod.levelOneTasks.find(t=>t.id===oneId);
    task[field] = value;
    if(field === "planFinishDate"){
        task.autoPlanDate = false;
    }
    if(field === "actualFinishDate"){
        task.autoActualDate = false;
    }
  }else if(type === "two"){
    const mod = ms.moduleList.find(item=>item.id===moduleId);
    const task = mod.levelOneTasks.find(t=>t.id===oneId);
    const two = task.levelTwoTasks.find(item=>item.id === twoId);
    two[field] = value;
    aggregateChildTaskDate(oneId, true);
  }
  saveAllData();
}
// ========== 渲染任务面板｜仅修复进度输入传参，其余原样 ==========

            <span style="font-size:12px;margin-right:4px;color:#235796;">【实际】</span>
            <input class="date-real" onclick="event.stopPropagation()" value="${mod.actualFinishDate}" title="实际完成日期：任务最终真实办结时间，对应导入表格的任务实际日期" onchange="updateTaskField('module',${mod.id},0,0,'actualFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="addLevelOneTask(${mod.id});event.stopPropagation()" class="text-xs btn-outline-primary px-2 py-1 rounded">新增一级任务</button>
          <button onclick="deleteModule(${mod.id});event.stopPropagation()" class="text-xs btn-outline-danger px-2 py-1 rounded">删除模块</button>
        </div>
      </div>
      <div class="collapse-body ${mod.open?'open':''}">
    `;
    if(mod.levelOneTasks.length === 0){
      html += `<div class="py-2 text-gray-400 text-sm">暂无一级任务，可点击上方按钮添加</div>`;
    }else{
      mod.levelOneTasks.forEach(oneTask=>{
        html += `
        <div class="collapse-item my-3">
          <div class="collapse-header py-2" onclick="toggleLevelOne(${mod.id},${oneTask.id})">
            <div class="flex items-center gap-3 flex-wrap">
              <span class="text-sm">${oneTask.open ? 'ˇ' : '›'}</span>
              <input class="title-input w-48 text-sm" value="${oneTask.name}" onclick="event.stopPropagation()" onchange="updateTaskField('one',${mod.id},${oneTask.id},0,'name',this.value)">
              <div class="progress-bar-bg"><div class="progress-bar-inner" style="width:${oneTask.progress}%"></div></div>
              <span class="text-xs text-gray-500">一级任务进度：${oneTask.progress}%（自动汇总）</span>
              <div class="flex gap-2 text-xs">
                <span style="font-size:12px;margin-right:4px;">【计划】</span>
                <input onclick="event.stopPropagation()" value="${oneTask.planFinishDate}" title="计划完成日期" onchange="updateTaskField('one',${mod.id},${oneTask.id},0,'planFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
                <span style="font-size:12px;margin-right:4px;color:#235796;">【实际】</span>
                <input class="date-real" onclick="event.stopPropagation()" value="${oneTask.actualFinishDate}" title="实际完成日期" onchange="updateTaskField('one',${mod.id},${oneTask.id},0,'actualFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
              </div>
            </div>
            <div class="flex gap-2">
              <button onclick="addLevelTwoTask(${mod.id},${oneTask.id});event.stopPropagation()" class="text-xs btn-outline-secondary px-2 py-1 rounded">新增二级任务</button>
              <button onclick="deleteLevelOneTask(${mod.id},${oneTask.id});event.stopPropagation()" class="text-xs btn-outline-danger px-2 py-1 rounded">删除本条一级任务</button>
            </div>
          </div>
          <div class="collapse-body ${oneTask.open?'open':''} pl-4">
        `;
        if(oneTask.levelTwoTasks.length === 0){
          html += `<div class="py-2 text-gray-400 text-sm">暂无二级细分任务</div>`;
        }else{
          oneTask.levelTwoTasks.forEach(twoTask=>{
            html += `
            <div class="flex items-center flex-wrap gap-3 py-2 border-b border-gray-200 text-sm">
              <input value="${twoTask.name}" onclick="event.stopPropagation()" onchange="updateTaskField('two',${mod.id},${oneTask.id},${twoTask.id},'name',this.value)" class="border border-gray-300 px-2 py-1 rounded w-40 focus:border-primary outline-none">
              <span style="font-size:12px;margin-right:4px;">【计划】</span>
              <input onclick="event.stopPropagation()" value="${twoTask.planFinishDate}" title="计划完成日期" onchange="updateTaskField('two',${mod.id},${oneTask.id},${twoTask.id},'planFinishDate',this.value)" type="date" class="border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
              <span style="font-size:12px;margin-right:4px;color:#235796;">【实际】</span>

              <div class="flex items-center gap-2">
                <input type="number" min="0" max="100" value="${twoTask.progress}" onclick="event.stopPropagation()" onblur="updateTwoProgress(${mod.id},${oneTask.id},${twoTask.id},this.value)" class="w-14 border border-gray-300 rounded px-1 py-1 focus:border-primary outline-none">
                <span class="text-black">%</span>
                <div class="progress-bar-bg"><div class="progress-bar-inner" style="width:${twoTask.progress}%"></div></div>
              </div>
              <button onclick="deleteLevelTwoTask(${mod.id},${oneTask.id},${twoTask.id});event.stopPropagation()" class="text-xs btn-outline-danger px-2 py-1 rounded">删除</button>
            </div>
            `;
          })
        }
        html += `</div></div>`;
      })
    }
    html += `</div></div>`;
  })
  container.innerHTML = html;
}
// V2.6.0 原生页面初始化函数，无任何修改
function originalPageLoad(){
  renderMilestone();
  renderTaskPanel();
}
// V2.6.4 双数据源加载逻辑完全保留无改动
async function loadRemoteData() {
    const remoteRawUrl = "https://raw.githubusercontent.com/LiXiangLuo/LiXiangLuo.github.io/main/task-data.json";
    const ossUrl = "https://itdallx.cn/task-data.json";
    const timeoutMs = 8000;
    let loadOk = false;

    {
        const abortCtrl = new AbortController();
        const timer = setTimeout(() => abortCtrl.abort(), timeoutMs);
        try {
            const resp = await fetch(remoteRawUrl, { signal: abortCtrl.signal });
            if (resp.ok) {
                const remoteJson = await resp.json();
                if (Array.isArray(remoteJson)) {
                    milestoneList = remoteJson;
                    renderMilestone();
                    renderTaskPanel();
                    loadOk = true;
                    console.log("【云端加载成功】GitHub私有仓库数据源");
                }
            } else {
                throw new Error(`HTTP状态码${resp.status}`);
            }
        } catch (err) {
            console.warn("【GitHub数据源加载失败】自动切换阿里云OSS备用源，错误信息：", err.message);
        } finally {
            clearTimeout(timer);
        }
    }

    if (!loadOk) {
        const abortCtrl = new AbortController();
        const timer = setTimeout(() => abortCtrl.abort(), timeoutMs);
        try {
            const ossResp = await fetch(ossUrl, { signal: abortCtrl.signal });
            if (ossResp.ok) {
                const ossJson = await ossResp.json();
                if (Array.isArray(ossJson)) {
                    milestoneList = ossJson;
                    renderMilestone();
                    renderTaskPanel();
                    loadOk = true;
                    console.log("【云端加载成功】阿里云OSS备用数据源");
                }
            } else {
                throw new Error(`HTTP状态码${ossResp.status}`);
            }
        } catch (ossErr) {
            console.log("【GitHub + OSS双数据源全部加载失败】将使用本地LocalStorage缓存数据，错误信息：", ossErr.message);
        } finally {
            clearTimeout(timer);
        }
    }
}
function downloadCloudJson() {
    const jsonStr = JSON.stringify(milestoneList, null, 2);
    const blob = new Blob([jsonStr], { type: "application/json" });
    const aTag = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "task-data.json";
    document.body.appendChild(aTag);
    aTag.click();
    document.body.removeChild(aTag);
    URL.revokeObjectURL(aTag.href);
}
window.onload = async function() {
    await loadRemoteData();
    originalPageLoad();
}
document.getElementById("exportCloudJsonBtn").addEventListener("click", downloadCloudJson);
</script>
